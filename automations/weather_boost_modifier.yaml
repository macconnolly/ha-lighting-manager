# Weather-Responsive Lighting Modifiers
# Sophisticated weather-based lighting adjustments using modifier layers
# 
# Features:
# - Progressive response based on weather severity
# - Smooth transitions between weather states
# - Hysteresis to prevent flapping
# - Zone-aware application (skip disabled zones)
# - Performance optimized with selective updates

input_number:
  weather_boost_base:
    name: Weather Boost Base Percentage
    min: 0
    max: 50
    step: 5
    initial: 15
    unit_of_measurement: "%"
    icon: mdi:weather-cloudy

input_select:
  weather_response_mode:
    name: Weather Response Mode
    options:
      - adaptive    # Varies by time of day
      - consistent  # Same boost regardless of time
      - aggressive  # Maximum boost for comfort
    initial: adaptive
    icon: mdi:tune-variant

template:
  - sensor:
      - name: "Weather Lighting Score"
        unique_id: weather_lighting_score
        state: >
          {% set conditions = {
            'sunny': 0,
            'clear-night': 0,
            'partlycloudy': 20,
            'cloudy': 40,
            'fog': 50,
            'rainy': 60,
            'pouring': 80,
            'lightning-rainy': 85,
            'snowy': 70,
            'snowy-rainy': 75,
            'hail': 90,
            'exceptional': 100
          } %}
          {% set current = states('weather.home') %}
          {{ conditions.get(current, 30) }}
        attributes:
          condition: "{{ states('weather.home') }}"
          cloud_coverage: "{{ state_attr('weather.home', 'cloud_coverage') | default(0) }}"
          precipitation_probability: "{{ state_attr('weather.home', 'precipitation_probability') | default(0) }}"
          needs_boost: >
            {{ states('sensor.weather_lighting_score') | int > 30 }}
          boost_percentage: >
            {% set score = states('sensor.weather_lighting_score') | int %}
            {% set base = states('input_number.weather_boost_base') | float %}
            {% set mode = states('input_select.weather_response_mode') %}
            {% set hour = now().hour %}
            
            {% if mode == 'adaptive' %}
              {# More boost during day, less at night #}
              {% set time_factor = 1.0 if 6 <= hour <= 18 else 0.7 %}
              {{ (score / 100 * base * time_factor) | round(0) }}
            {% elif mode == 'aggressive' %}
              {{ (score / 100 * base * 1.5) | round(0) }}
            {% else %}
              {{ (score / 100 * base) | round(0) }}
            {% endif %}
          color_temp_shift: >
            {% set score = states('sensor.weather_lighting_score') | int %}
            {# Warmer light in bad weather, -100K to -500K #}
            {{ -100 - (score * 4) | int }}
          transition_time: >
            {# Slower transitions for gradual weather changes #}
            {% set score_change = (states('sensor.weather_lighting_score') | int - 
                                   this.attributes.get('last_score', 0) | int) | abs %}
            {% if score_change > 40 %}
              10
            {% elif score_change > 20 %}
              5
            {% else %}
              2
            {% endif %}
          last_score: "{{ states('sensor.weather_lighting_score') }}"

automation:
  - alias: "Lighting: Intelligent Weather Response"
    id: lighting_intelligent_weather_response
    description: >
      Applies sophisticated weather-based lighting adjustments across all zones.
      Uses hysteresis and progressive response for smooth, natural transitions.
    mode: queued
    max: 2
    
    trigger:
      # Weather score crosses thresholds with hysteresis
      - platform: numeric_state
        entity_id: sensor.weather_lighting_score
        above: 35
        id: boost_needed
      - platform: numeric_state
        entity_id: sensor.weather_lighting_score
        below: 25
        id: boost_not_needed
      # Settings changes
      - platform: state
        entity_id: 
          - input_select.weather_response_mode
          - input_number.weather_boost_base
        id: settings_changed
      # Periodic refresh for active boosts
      - platform: time_pattern
        minutes: "/30"
        id: refresh
    
    condition:
      # Don't run at night unless in aggressive mode
      - or:
          - condition: time
            after: "06:00:00"
            before: "23:00:00"
          - condition: state
            entity_id: input_select.weather_response_mode
            state: aggressive
    
    variables:
      score: "{{ states('sensor.weather_lighting_score') | int }}"
      boost_pct: "{{ state_attr('sensor.weather_lighting_score', 'boost_percentage') | int }}"
      color_shift: "{{ state_attr('sensor.weather_lighting_score', 'color_temp_shift') | int }}"
      transition: "{{ state_attr('sensor.weather_lighting_score', 'transition_time') | float }}"
      needs_boost: "{{ score > 30 }}"
      
    action:
      - choose:
          # Apply or update boost
          - conditions:
              - condition: template
                value_template: "{{ needs_boost }}"
            sequence:
              # Get all zones that should receive boost
              - variables:
                  all_zones: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') }}"
                  # Filter to only zones that are configured and have lights available
                  active_zones: >
                    {% set ns = namespace(zones=[]) %}
                    {% for zone in all_zones %}
                      {% set status_sensor = 'sensor.' ~ zone ~ '_status' %}
                      {% if states(status_sensor) not in ['unavailable', 'unknown', 'error'] %}
                        {% set ns.zones = ns.zones + [zone] %}
                      {% endif %}
                    {% endfor %}
                    {{ ns.zones }}
              
              # Apply boost to each active zone
              - repeat:
                  for_each: "{{ active_zones }}"
                  sequence:
                    - service: lighting_manager.set_layer
                      data:
                        zone_id: "{{ repeat.item }}"
                        layer_id: "weather_modifier"
                        layer_name: "Weather Response"
                        layer_type: "modifier"
                        priority: 72  # Just below forced overrides
                        brightness_pct_delta: "{{ boost_pct }}"
                        color_temp_kelvin_delta: "{{ color_shift }}"
                        transition: "{{ transition }}"
                        # Longer timeout for stable weather
                        timeout_minutes: >
                          {% if trigger.id == 'refresh' %}
                            45
                          {% else %}
                            90
                          {% endif %}
                    
                    # Activate if not already on
                    - service: switch.turn_on
                      target:
                        entity_id: "switch.{{ repeat.item }}_weather_modifier_layer"
                    
                    # Small delay to prevent thundering herd
                    - delay:
                        milliseconds: 50
          
          # Remove boost
          - conditions:
              - condition: template
                value_template: "{{ not needs_boost and trigger.id != 'refresh' }}"
            sequence:
              # Turn off all weather modifiers gracefully
              - service: switch.turn_off
                target:
                  entity_id: >
                    {% set ns = namespace(entities=[]) %}
                    {% for zone in state_attr('sensor.lighting_manager_zones', 'zone_ids') %}
                      {% set entity = 'switch.' ~ zone ~ '_weather_modifier_layer' %}
                      {% if states(entity) == 'on' %}
                        {% set ns.entities = ns.entities + [entity] %}
                      {% endif %}
                    {% endfor %}
                    {{ ns.entities }}

  - alias: "Lighting: Weather Forecast Preemption"
    id: lighting_weather_forecast_preemption
    description: >
      Preemptively adjusts lighting based on incoming weather.
      Provides smooth transition before weather actually arrives.
    mode: single
    
    trigger:
      - platform: time_pattern
        minutes: "/15"
    
    condition:
      - condition: template
        value_template: >
          {% set forecast = state_attr('weather.home', 'forecast') %}
          {% if forecast and forecast[0] is defined %}
            {% set next_condition = forecast[0].condition %}
            {% set bad_weather = ['rainy', 'pouring', 'lightning-rainy', 'snowy', 'hail'] %}
            {{ next_condition in bad_weather and 
               states('weather.home') not in bad_weather }}
          {% else %}
            false
          {% endif %}
    
    action:
      # Apply a gentle pre-boost
      - repeat:
          for_each: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') }}"
          sequence:
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ repeat.item }}"
                layer_id: "weather_preempt"
                layer_name: "Weather Preparation"
                layer_type: "modifier"
                priority: 65  # Lower priority than actual weather
                brightness_pct_delta: 8
                color_temp_kelvin_delta: -150
                transition: 30  # Very slow transition
                timeout_minutes: 20
            
            - service: switch.turn_on
              target:
                entity_id: "switch.{{ repeat.item }}_weather_preempt_layer"