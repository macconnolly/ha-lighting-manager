# Activity-Based Lighting Modifiers
# Context-aware lighting adjustments based on current activities
#
# Demonstrates how modifier layers enable sophisticated scene management
# without duplicating configurations across zones

input_select:
  house_activity_mode:
    name: House Activity Mode
    options:
      - normal
      - working
      - cooking
      - dining
      - entertaining
      - movie
      - gaming
      - reading
      - cleaning
    initial: normal
    icon: mdi:home-account

  activity_response_level:
    name: Activity Response Level
    options:
      - subtle     # Minimal adjustments
      - balanced   # Moderate changes
      - dramatic   # Maximum effect
    initial: balanced
    icon: mdi:tune-vertical

input_boolean:
  activity_modifiers_enabled:
    name: Activity-Based Lighting
    initial: true
    icon: mdi:motion-sensor

  activity_auto_detect:
    name: Auto-Detect Activities
    initial: true
    icon: mdi:head-lightbulb

template:
  - sensor:
      - name: "Detected Activity"
        unique_id: detected_activity
        state: >
          {% if not is_state('input_boolean.activity_auto_detect', 'on') %}
            {{ states('input_select.house_activity_mode') }}
          {% else %}
            {# Intelligent activity detection based on multiple factors #}
            {% set hour = now().hour %}
            {% set day = now().weekday() %}
            {% set is_weekend = day in [5, 6] %}
            
            {# Check media players #}
            {% set tv_on = is_state('media_player.living_room_tv', 'playing') %}
            {% set gaming = is_state('media_player.xbox', 'playing') or 
                           is_state('media_player.playstation', 'playing') %}
            
            {# Check motion and occupancy #}
            {% set kitchen_active = is_state('binary_sensor.kitchen_motion', 'on') %}
            {% set office_occupied = is_state('binary_sensor.office_occupancy', 'on') %}
            
            {# Check other indicators #}
            {% set stove_on = states('sensor.stove_power') | float > 100 %}
            {% set dishwasher_running = is_state('sensor.dishwasher_status', 'running') %}
            
            {# Decision tree #}
            {% if gaming %}
              gaming
            {% elif tv_on and hour >= 19 %}
              movie
            {% elif stove_on or (kitchen_active and 16 <= hour <= 20) %}
              cooking
            {% elif dishwasher_running %}
              cleaning
            {% elif office_occupied and not is_weekend and 8 <= hour <= 17 %}
              working
            {% elif hour >= 21 %}
              reading
            {% else %}
              normal
            {% endif %}
          {% endif %}
        attributes:
          source: >
            {{ 'manual' if not is_state('input_boolean.activity_auto_detect', 'on') else 'auto' }}
          confidence: >
            {% if not is_state('input_boolean.activity_auto_detect', 'on') %}
              100
            {% else %}
              {# Calculate confidence based on number of indicators #}
              {% set indicators = 0 %}
              {% if is_state('media_player.living_room_tv', 'playing') %}
                {% set indicators = indicators + 1 %}
              {% endif %}
              {% if states('sensor.stove_power') | float > 100 %}
                {% set indicators = indicators + 1 %}
              {% endif %}
              {% if is_state('binary_sensor.kitchen_motion', 'on') %}
                {% set indicators = indicators + 1 %}
              {% endif %}
              {{ [100, indicators * 35] | min }}
            {% endif %}
          
      - name: "Activity Lighting Profile"
        unique_id: activity_lighting_profile
        state: "{{ states('sensor.detected_activity') }}"
        attributes:
          brightness_modifier: >
            {% set activity = states('sensor.detected_activity') %}
            {% set level = states('input_select.activity_response_level') %}
            
            {% set profiles = {
              'normal': {'subtle': 0, 'balanced': 0, 'dramatic': 0},
              'working': {'subtle': 5, 'balanced': 15, 'dramatic': 25},
              'cooking': {'subtle': 10, 'balanced': 20, 'dramatic': 35},
              'dining': {'subtle': -10, 'balanced': -20, 'dramatic': -30},
              'entertaining': {'subtle': -5, 'balanced': -15, 'dramatic': -25},
              'movie': {'subtle': -20, 'balanced': -40, 'dramatic': -60},
              'gaming': {'subtle': -10, 'balanced': -25, 'dramatic': -40},
              'reading': {'subtle': 5, 'balanced': 10, 'dramatic': 20},
              'cleaning': {'subtle': 15, 'balanced': 30, 'dramatic': 45}
            } %}
            
            {{ profiles.get(activity, {}).get(level, 0) }}
          
          color_temp_modifier: >
            {% set activity = states('sensor.detected_activity') %}
            {% set level = states('input_select.activity_response_level') %}
            
            {% set profiles = {
              'normal': {'subtle': 0, 'balanced': 0, 'dramatic': 0},
              'working': {'subtle': 200, 'balanced': 400, 'dramatic': 600},
              'cooking': {'subtle': 100, 'balanced': 200, 'dramatic': 300},
              'dining': {'subtle': -200, 'balanced': -400, 'dramatic': -600},
              'entertaining': {'subtle': -150, 'balanced': -300, 'dramatic': -450},
              'movie': {'subtle': -300, 'balanced': -500, 'dramatic': -700},
              'gaming': {'subtle': 100, 'balanced': 200, 'dramatic': 400},
              'reading': {'subtle': 0, 'balanced': 100, 'dramatic': 200},
              'cleaning': {'subtle': 300, 'balanced': 500, 'dramatic': 700}
            } %}
            
            {{ profiles.get(activity, {}).get(level, 0) }}
          
          affected_zones: >
            {% set activity = states('sensor.detected_activity') %}
            {% set all_zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') %}
            
            {% if activity == 'cooking' %}
              {{ all_zones | select('search', 'kitchen|dining') | list }}
            {% elif activity == 'movie' %}
              {{ all_zones | select('search', 'living|family|media') | list }}
            {% elif activity == 'working' %}
              {{ all_zones | select('search', 'office|study|desk') | list }}
            {% elif activity == 'gaming' %}
              {{ all_zones | select('search', 'game|play|media') | list }}
            {% elif activity == 'dining' %}
              {{ all_zones | select('search', 'dining|kitchen') | list }}
            {% elif activity == 'cleaning' %}
              {{ all_zones }}
            {% else %}
              {{ all_zones }}
            {% endif %}
          
          priority: >
            {% set activity = states('sensor.detected_activity') %}
            {% set priorities = {
              'normal': 40,
              'working': 55,
              'cooking': 58,
              'dining': 52,
              'entertaining': 50,
              'movie': 60,
              'gaming': 56,
              'reading': 48,
              'cleaning': 62
            } %}
            {{ priorities.get(activity, 40) }}
          
          transition_time: >
            {% set activity = states('sensor.detected_activity') %}
            {% set old_activity = this.state if this is defined else 'normal' %}
            
            {# Quick transitions for urgent activities #}
            {% if activity in ['cooking', 'cleaning'] %}
              2
            {# Slow transitions for ambiance #}
            {% elif activity in ['movie', 'dining', 'entertaining'] %}
              10
            {# Medium for everything else #}
            {% else %}
              5
            {% endif %}

automation:
  - alias: "Lighting: Activity-Based Modifier Controller"
    id: lighting_activity_modifier_controller
    description: >
      Applies intelligent lighting modifiers based on detected or selected activities.
      Provides zone-aware adjustments with smooth transitions.
    mode: restart
    
    trigger:
      # Activity changes
      - platform: state
        entity_id: sensor.detected_activity
        id: activity_change
      
      # Manual mode selection
      - platform: state
        entity_id: input_select.house_activity_mode
        id: manual_change
      
      # Response level changes
      - platform: state
        entity_id: input_select.activity_response_level
        id: level_change
      
      # Enable/disable
      - platform: state
        entity_id: input_boolean.activity_modifiers_enabled
        id: toggle
    
    condition:
      - condition: state
        entity_id: input_boolean.activity_modifiers_enabled
        state: "on"
    
    variables:
      activity: "{{ states('sensor.detected_activity') }}"
      brightness_mod: "{{ state_attr('sensor.activity_lighting_profile', 'brightness_modifier') | int }}"
      color_mod: "{{ state_attr('sensor.activity_lighting_profile', 'color_temp_modifier') | int }}"
      priority: "{{ state_attr('sensor.activity_lighting_profile', 'priority') | int }}"
      transition: "{{ state_attr('sensor.activity_lighting_profile', 'transition_time') | float }}"
      affected_zones: "{{ state_attr('sensor.activity_lighting_profile', 'affected_zones') }}"
      all_zones: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') }}"
    
    action:
      # Remove modifiers from unaffected zones first
      - repeat:
          for_each: >
            {% set unaffected = [] %}
            {% for zone in all_zones %}
              {% if zone not in affected_zones %}
                {% set unaffected = unaffected + [zone] %}
              {% endif %}
            {% endfor %}
            {{ unaffected }}
          sequence:
            - service: switch.turn_off
              target:
                entity_id: "switch.{{ repeat.item }}_activity_modifier_layer"
              continue_on_error: true
      
      # Apply modifiers to affected zones
      - repeat:
          for_each: "{{ affected_zones }}"
          sequence:
            # Skip if zone has no active lighting
            - condition: template
              value_template: >
                {% set active = states('sensor.' ~ repeat.item ~ '_active_layer') %}
                {{ active not in ['none', 'unavailable', 'unknown'] }}
            
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ repeat.item }}"
                layer_id: "activity_modifier"
                layer_name: "Activity: {{ activity | title }}"
                layer_type: "modifier"
                priority: "{{ priority }}"
                brightness_pct_delta: "{{ brightness_mod }}"
                color_temp_kelvin_delta: "{{ color_mod }}"
                transition: "{{ transition }}"
                timeout_minutes: 120
            
            - service: switch.turn_on
              target:
                entity_id: "switch.{{ repeat.item }}_activity_modifier_layer"
            
            # Stagger for smooth response
            - delay:
                milliseconds: 50

  - alias: "Lighting: Focus Mode Enhancement"
    id: lighting_focus_mode_enhancement
    description: >
      Enhances lighting for concentration when work/study detected.
      Uses multiple modifier layers for comprehensive adjustment.
    mode: single
    
    trigger:
      - platform: state
        entity_id: sensor.detected_activity
        to: working
      - platform: state
        entity_id: binary_sensor.office_occupancy
        to: "on"
        for:
          minutes: 2
    
    condition:
      - condition: state
        entity_id: input_boolean.activity_modifiers_enabled
        state: "on"
      - condition: state
        entity_id: sensor.detected_activity
        state: working
    
    action:
      # Find the work zone
      - variables:
          work_zones: >
            {% set all_zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') %}
            {% set work = namespace(zones=[]) %}
            {% for zone in all_zones %}
              {% if 'office' in zone or 'study' in zone or 'desk' in zone %}
                {% set work.zones = work.zones + [zone] %}
              {% endif %}
            {% endfor %}
            {{ work.zones if work.zones else [all_zones[0]] }}
      
      # Apply progressive focus enhancement
      - repeat:
          for_each: "{{ work_zones }}"
          sequence:
            # Primary focus modifier - bright, cool light
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ repeat.item }}"
                layer_id: "focus_primary"
                layer_name: "Focus Enhancement"
                layer_type: "modifier"
                priority: 65
                brightness_pct_delta: 20
                color_temp_kelvin_delta: 500
                transition: 3
                timeout_minutes: 60
            
            # Anti-fatigue modifier - slight variations over time
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ repeat.item }}"
                layer_id: "anti_fatigue"
                layer_name: "Anti-Fatigue"
                layer_type: "modifier"
                priority: 45
                brightness_pct_delta: "{{ range(-5, 5) | random }}"
                transition: 30
                timeout_minutes: 15
            
            # Turn on both modifiers
            - service: switch.turn_on
              target:
                entity_id:
                  - "switch.{{ repeat.item }}_focus_primary_layer"
                  - "switch.{{ repeat.item }}_anti_fatigue_layer"