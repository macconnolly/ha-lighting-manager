    name: "Warmth Adjustment Step"
    icon: mdi:thermometer
    min: 100
    max: 500
    step: 100
    initial: 200
    mode: box
  al_manual_control_timeout_hours:
    name: "Manual Control Timeout"
    icon: mdi:timer-outline
    min: 1
    max: 8
    step: 0.5
    initial: 2
  al_general_transition_speed:
    name: "General Transition Speed"
    icon: mdi:speedometer
    min: 0
    max: 10
    step: 0.5
    initial: 2

  # V3.3 CORE: Manual Override Helpers (10 total)
  al_main_living_manual_brightness_override: { name: "Sys: Main Living Brightness Override", min: -50, max: 50, step: 1 }
  al_main_living_manual_warmth_override: { name: "Sys: Main Living Warmth Override", min: -1000, max: 1000, step: 50 }
  al_kitchen_island_manual_brightness_override: { name: "Sys: Kitchen Brightness Override", min: -50, max: 50, step: 1 }
  al_kitchen_island_manual_warmth_override: { name: "Sys: Kitchen Warmth Override", min: -1000, max: 1000, step: 50 }
  al_bedroom_primary_manual_brightness_override: { name: "Sys: Bedroom Brightness Override", min: -50, max: 50, step: 1 }
  al_bedroom_primary_manual_warmth_override: { name: "Sys: Bedroom Warmth Override", min: -1000, max: 1000, step: 50 }
  al_accent_spots_manual_brightness_override: { name: "Sys: Accents Brightness Override", min: -50, max: 50, step: 1 }
  al_accent_spots_manual_warmth_override: { name: "Sys: Accents Warmth Override", min: -1000, max: 1000, step: 50 }
  al_recessed_ceiling_manual_brightness_override: { name: "Sys: Recessed Brightness Override", min: -50, max: 50, step: 1 }
  al_recessed_ceiling_manual_warmth_override: { name: "Sys: Recessed Warmth Override", min: -1000, max: 1000, step: 50 }

  # System-level override helpers (non-manual)
  al_system_brightness_override:
    name: "Sys: System Brightness Override"
    icon: mdi:tune
    min: -50
    max: 50
    step: 1
