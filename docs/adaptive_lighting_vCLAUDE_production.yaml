  al_kitchen_island_target_max_color_temp: { name: "Sys: Kitchen Target Max Color Temp", min: 1000, max: 10000 }
  al_bedroom_primary_target_min_brightness: { name: "Sys: Bedroom Target Min Brightness",  min: 1, max: 100 }
  al_bedroom_primary_target_max_brightness: { name: "Sys: Bedroom Target Max Brightness", min: 1, max: 100 }
  al_bedroom_primary_target_min_color_temp: { name: "Sys: Bedroom Target Min Color Temp", min: 1000, max: 10000 }
  al_bedroom_primary_target_max_color_temp: { name: "Sys: Bedroom Target Max Color Temp", min: 1000, max: 10000 }
  al_accent_spots_target_min_brightness: { name: "Sys: Accents Target Min Brightness", min: 1, max: 100 }
  al_accent_spots_target_max_brightness: { name: "Sys: Accents Target Max Brightness", min: 1, max: 100 }
  al_accent_spots_target_min_color_temp: { name: "Sys: Accents Target Min Color Temp", min: 1000, max: 10000 }
  al_accent_spots_target_max_color_temp: { name: "Sys: Accents Target Max Color Temp", min: 1000, max: 10000 }
  al_recessed_ceiling_target_min_brightness: { name: "Sys: Recessed Target Min Brightness", min: 1, max: 100 }
  al_recessed_ceiling_target_max_brightness: { name: "Sys: Recessed Target Max Brightness", min: 1, max: 100 }
