  # V3.4 CORE: Layered State Controller Helpers
  al_environmental_brightness_boost: { name: "Sys: Environmental Brightness Boost", min: -50, max: 50, step: 1 }
  al_environmental_warmth_boost: { name: "Sys: Environmental Warmth Boost", min: -1000, max: 1000, step: 50 }
  al_sunset_brightness_boost: { name: "Sys: Sunset Brightness Boost", min: 0, max: 50, step: 1 }
