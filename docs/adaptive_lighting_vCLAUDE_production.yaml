  al_weather_compensation:
    name: "Weather Compensation"
    icon: mdi:weather-cloudy
  al_climate_sync:
    name: "HVAC Climate Sync"
    icon: mdi:thermometer-lines
  al_sunset_boost_active:
    name: "Sunset Boost Active"
    icon: mdi:weather-sunset-down
  al_environmental_influence_enabled:
    name: "Environmental Influence Enabled"
    icon: mdi:nature
    initial: on
  al_main_living_k_control_enabled:
    name: "Zone K-Value Control: Main Living"
    initial: on
  al_kitchen_island_k_control_enabled:
    name: "Zone K-Value Control: Kitchen Island"
    initial: on
