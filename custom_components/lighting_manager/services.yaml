# Service definitions for Lighting Manager

create_layer:
  name: Create Layer
  description: Create a new layer for a zone
  target:
    entity:
      integration: lighting_manager
      domain: switch
  fields:
    layer_name:
      name: Layer Name
      description: Name for the new layer
      required: true
      example: "Movie Time"
      selector:
        text:
    priority:
      name: Priority
      description: Layer priority (0-100, higher wins)
      required: false
      default: 50
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    brightness:
      name: Brightness
      description: Brightness level (0-255)
      required: false
      selector:
        number:
          min: 0
          max: 255
    color_temp:
      name: Color Temperature
      description: Color temperature in mireds
      required: false
      selector:
        number:
          min: 153
          max: 500
    transition:
      name: Transition
      description: Transition time in seconds
      required: false
      default: 2.0
      selector:
        number:
          min: 0
          max: 300
          step: 0.1