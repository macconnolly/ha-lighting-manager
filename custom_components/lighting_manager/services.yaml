# Service definitions for Lighting Manager

# Primary Layer Service - Creates or updates layers
set_layer:
  name: Set Layer
  description: Create or update a layer with specified parameters (idempotent)
  fields:
    zone_id:
      name: Zone ID
      description: The zone containing the layer
      required: true
      example: "living_room"
      selector:
        text:
    layer_id:
      name: Layer ID
      description: Unique identifier for the layer (auto-generated from layer_name if not provided)
      required: false
      example: "weather_boost"
      selector:
        text:
    layer_name:
      name: Layer Name
      description: Human-readable layer name
      required: true
      example: "Weather Boost"
      selector:
        text:
    layer_type:
      name: Layer Type
      description: Type of layer - absolute provides full state, modifier transforms state
      required: false
      default: "absolute"
      selector:
        select:
          options:
            - "absolute"
            - "modifier"
            - "multiplier"
    is_on:
      name: Is On
      description: Whether the layer is active
      required: false
      default: true
      selector:
        boolean:
    priority:
      name: Priority
      description: Layer priority (0-100, higher wins for absolute, higher applies for modifiers)
      required: false
      default: 50
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    # Absolute layer attributes (only for layer_type: absolute)
    brightness:
      name: Brightness
      description: Brightness level (0-255) - only for absolute layers
      required: false
      selector:
        number:
          min: 0
          max: 255
    color_temp:
      name: Color Temperature
      description: Color temperature in mireds - only for absolute layers
      required: false
      selector:
        number:
          min: 153
          max: 500
    rgb_color:
      name: RGB Color
      description: RGB color values - only for absolute layers
      required: false
      selector:
        color_rgb:
    # Modifier layer attributes (only for layer_type: modifier/multiplier)
    brightness_pct_delta:
      name: Brightness Percentage Delta
      description: Percentage change to brightness (+20 for 20% brighter) - modifier layers only
      required: false
      selector:
        number:
          min: -100
          max: 100
          unit_of_measurement: "%"
    color_temp_kelvin_delta:
      name: Color Temperature Kelvin Delta
      description: Kelvin change to color temp (-500 for 500K warmer) - modifier layers only
      required: false
      selector:
        number:
          min: -5000
          max: 5000
          unit_of_measurement: "K"
    brightness_factor:
      name: Brightness Factor
      description: Multiply brightness by this factor (0.5 for 50% dimmer) - modifier layers only
      required: false
      selector:
        number:
          min: 0
          max: 2
          step: 0.1
    color_temp_factor:
      name: Color Temperature Factor
      description: Multiply color temp by this factor - modifier layers only
      required: false
      selector:
        number:
          min: 0.5
          max: 2
          step: 0.1
    # Common attributes
    transition:
      name: Transition
      description: Transition time in seconds
      required: false
      default: 2.0
      selector:
        number:
          min: 0
          max: 300
          step: 0.1
    force:
      name: Force
      description: Force this layer to override priorities
      required: false
      default: false
      selector:
        boolean:
    locked:
      name: Locked
      description: Lock layer to prevent modifications
      required: false
      default: false
      selector:
        boolean:
    timeout_minutes:
      name: Timeout Minutes
      description: Auto-remove layer after this many minutes
      required: false
      selector:
        number:
          min: 0.1
          max: 10080
          unit_of_measurement: "min"
    source:
      name: Source
      description: What created/updated this layer
      required: false
      example: "automation.weather_monitor"
      selector:
        text:

# Legacy Layer Control Services (kept for compatibility)
activate_layer:
  name: Activate Layer
  description: Activate a layer with specified parameters
  target:
    entity:
      integration: lighting_manager
      domain: switch
  fields:
    brightness:
      name: Brightness
      description: Brightness level (0-255)
      required: false
      selector:
        number:
          min: 0
          max: 255
    color_temp:
      name: Color Temperature
      description: Color temperature in mireds
      required: false
      selector:
        number:
          min: 153
          max: 500
    rgb_color:
      name: RGB Color
      description: RGB color values
      required: false
      selector:
        color_rgb:
    transition:
      name: Transition
      description: Transition time in seconds
      required: false
      default: 2.0
      selector:
        number:
          min: 0
          max: 300
          step: 0.1
    source:
      name: Source
      description: What triggered this activation
      required: false
      example: "automation.sunset"
      selector:
        text:

deactivate_layer:
  name: Deactivate Layer
  description: Deactivate specified layers
  target:
    entity:
      integration: lighting_manager
      domain: switch
  fields:
    source:
      name: Source
      description: What triggered this deactivation
      required: false
      example: "manual"
      selector:
        text:

update_layer:
  name: Update Layer
  description: Update layer attributes without changing activation state
  target:
    entity:
      integration: lighting_manager
      domain: switch
  fields:
    brightness:
      name: Brightness
      description: Brightness level (0-255)
      required: false
      selector:
        number:
          min: 0
          max: 255
    color_temp:
      name: Color Temperature
      description: Color temperature in mireds
      required: false
      selector:
        number:
          min: 153
          max: 500
    rgb_color:
      name: RGB Color
      description: RGB color values
      required: false
      selector:
        color_rgb:
    transition:
      name: Transition
      description: Transition time in seconds
      required: false
      selector:
        number:
          min: 0
          max: 300
          step: 0.1

set_layer_priority:
  name: Set Layer Priority
  description: Change the priority of a layer
  target:
    entity:
      integration: lighting_manager
      domain: switch
  fields:
    priority:
      name: Priority
      description: New priority value (0-100, higher wins)
      required: true
      selector:
        number:
          min: 0
          max: 100
          mode: slider

# Layer State Services
lock_layer:
  name: Lock Layer
  description: Lock a layer to prevent any modifications
  fields:
    zone_id:
      name: Zone ID
      description: The zone containing the layer
      required: true
      example: "living_room"
      selector:
        text:
    layer_id:
      name: Layer ID
      description: The layer to lock
      required: true
      example: "manual"
      selector:
        text:

unlock_layer:
  name: Unlock Layer
  description: Unlock a layer to allow modifications
  fields:
    zone_id:
      name: Zone ID
      description: The zone containing the layer
      required: true
      example: "living_room"
      selector:
        text:
    layer_id:
      name: Layer ID
      description: The layer to unlock
      required: true
      example: "manual"
      selector:
        text:

force_layer:
  name: Force Layer
  description: Force a layer to override all other priorities
  fields:
    zone_id:
      name: Zone ID
      description: The zone containing the layer
      required: true
      example: "living_room"
      selector:
        text:
    layer_id:
      name: Layer ID
      description: The layer to force
      required: true
      example: "manual"
      selector:
        text:
    force:
      name: Force
      description: Whether to force this layer
      required: false
      default: true
      selector:
        boolean:

unforce_layer:
  name: Unforce Layer
  description: Remove force flag from a layer
  fields:
    zone_id:
      name: Zone ID
      description: The zone containing the layer
      required: true
      example: "living_room"
      selector:
        text:
    layer_id:
      name: Layer ID
      description: The layer to unforce
      required: true
      example: "manual"
      selector:
        text:

# Zone Control Services
recalculate_zone:
  name: Recalculate Zone
  description: Force immediate recalculation of zone lighting state
  fields:
    zone_id:
      name: Zone ID
      description: The zone to recalculate
      required: true
      example: "living_room"
      selector:
        text:

reset_zone:
  name: Reset Zone
  description: Reset zone by deactivating all layers except base adaptive
  fields:
    zone_id:
      name: Zone ID
      description: The zone to reset
      required: true
      example: "living_room"
      selector:
        text:

# Advanced Services
apply_preset:
  name: Apply Preset
  description: Apply a preset configuration to a zone
  fields:
    zone_id:
      name: Zone ID
      description: The zone to apply the preset to
      required: true
      example: "living_room"
      selector:
        text:
    preset_name:
      name: Preset Name
      description: Name of the preset to apply
      required: true
      selector:
        select:
          options:
            - bright
            - dim
            - movie
            - adaptive
            - "off"
    transition:
      name: Transition
      description: Transition time in seconds
      required: false
      default: 2.0
      selector:
        number:
          min: 0
          max: 300
          step: 0.1