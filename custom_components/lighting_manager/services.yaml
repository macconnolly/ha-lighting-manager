insert_scene:
  name: Insert Scene
  description: Apply a scene on a specific layer.
  fields:
    entity_id:
      required: true
      selector:
        entity:
          domain: scene
    id:
      required: true
      selector:
        text:
    priority:
      required: true
      selector:
        number:
          min: 0
          max: 100
    clear_layer:
      selector:
        boolean:
    color:
      selector:
        color_rgb:

insert_state:
  name: Insert State
  description: Set an entity state at a layer.
  fields:
    entity_id:
      required: true
      selector:
        entity:
          multiple: true
    priority:
      required: true
      selector:
        number:
          min: 0
          max: 100
    id:
      required: true
      selector:
        text:
    state:
      selector:
        text:
    attributes:
      selector:
        object:
    clear_layer:
      selector:
        boolean:

remove_layer:
  name: Remove Layer
  description: Remove a layer from entities.
  fields:
    entity_id:
      selector:
        entity:
          multiple: true
    id:
      required: true
      selector:
        text:

refresh:
  name: Refresh Entity
  description: Refresh a managed entity or group.
  fields:
    entity_id:
      required: true
      selector:
        entity:
          multiple: true

refresh_all:
  name: Refresh All
  description: Refresh all managed entities.

add_adaptive:
  name: Add Adaptive
  description: Enable adaptive updates for lights.
  fields:
    entity_id:
      required: true
      selector:
        entity:
          multiple: true
    brightness:
      selector:
        boolean:
    color_temp:
      selector:
        boolean:

remove_adaptive:
  name: Remove Adaptive
  description: Disable adaptive updates for lights.
  fields:
    entity_id:
      required: true
      selector:
        entity:
          multiple: true

activate_layer:
  name: Activate Layer
  description: Activate a layer with optional attribute overrides.
  target:
    entity:
      domain: layer
  fields:
    brightness:
      selector:
        number:
          min: 0
          max: 255
    color_temp:
      selector:
        number:
          min: 0
          max: 1000
    rgb_color:
      selector:
        color_rgb:
    transition:
      selector:
        number:
          min: 0
          max: 60
          step: 0.1
    force:
      selector:
        boolean:
    locked:
      selector:
        boolean:
    conditions:
      selector:
        object:
    source:
      selector:
        text:

update_layer:
  name: Update Layer
  description: Update attributes on a layer.
  target:
    entity:
      domain: layer
  fields:
    brightness:
      selector:
        number:
          min: 0
          max: 255
    color_temp:
      selector:
        number:
          min: 0
          max: 1000
    rgb_color:
      selector:
        color_rgb:
    transition:
      selector:
        number:
          min: 0
          max: 60
          step: 0.1
    force:
      selector:
        boolean:
    locked:
      selector:
        boolean:
    conditions:
      selector:
        object:
    source:
      selector:
        text:

deactivate_layer:
  name: Deactivate Layer
  description: Deactivate a layer.
  target:
    entity:
      domain: layer
