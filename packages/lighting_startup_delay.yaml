# Startup Delay Handler for Lighting Manager
# Ensures all entities are available before packages try to access them
#
# This package should be loaded first to coordinate startup timing

input_boolean:
  lighting_manager_ready:
    name: Lighting Manager Ready
    icon: mdi:check-circle
    initial: false

automation:
  - alias: "Lighting: System Startup Coordinator"
    id: lighting_system_startup_coordinator
    description: "Wait for all entities to be available before enabling modifiers"
    mode: single
    
    trigger:
      - platform: homeassistant
        event: start
    
    action:
      # First, ensure the flag is off
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.lighting_manager_ready
      
      # Wait for core services to initialize
      - delay:
          seconds: 30
      
      # Check if lighting manager zones sensor exists
      - wait_template: "{{ states('sensor.lighting_manager_zones') not in ['unknown', 'unavailable'] }}"
        timeout: "00:02:00"
        continue_on_timeout: true
      
      # Additional delay to ensure all zone entities are created
      - delay:
          seconds: 10
      
      # Check if at least one zone switch exists
      - condition: template
        value_template: >
          {% set zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) %}
          {% if zones | length > 0 %}
            {% set first_zone = zones[0] %}
            {{ states('switch.' ~ first_zone ~ '_manual_layer') not in ['unknown', 'unavailable'] }}
          {% else %}
            false
          {% endif %}
      
      # Signal that the system is ready
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.lighting_manager_ready
      
      # Fire an event that other automations can listen for
      - event: lighting_manager_ready
        event_data:
          zones_count: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) | length }}"
      
      # Send notification
      - service: persistent_notification.create
        data:
          title: "Lighting Manager Ready"
          message: >
            Lighting Manager is fully initialized with 
            {{ state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) | length }} zones.
            All modifier packages can now activate.
          notification_id: lighting_manager_startup

  - alias: "Lighting: Delayed Package Initialization"
    id: lighting_delayed_package_initialization
    description: "Initialize all modifier packages after system is ready"
    mode: single
    
    trigger:
      - platform: state
        entity_id: input_boolean.lighting_manager_ready
        to: "on"
      - platform: event
        event_type: lighting_manager_ready
    
    action:
      # Initialize circadian if enabled
      - condition: state
        entity_id: input_boolean.circadian_lighting
        state: "on"
      
      - event: lighting_package_init
        event_data:
          package: "circadian"
      
      # Small delay between package initializations
      - delay:
          seconds: 2
      
      # Initialize other packages as needed
      - event: lighting_package_init
        event_data:
          package: "weather"
      
      - delay:
          seconds: 2
      
      - event: lighting_package_init
        event_data:
          package: "presence"

template:
  - binary_sensor:
      - name: "Lighting System Health"
        unique_id: lighting_system_health
        device_class: problem
        state: >
          {% set ready = is_state('input_boolean.lighting_manager_ready', 'on') %}
          {% set zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) %}
          {{ not ready or zones | length == 0 }}
        attributes:
          ready: "{{ is_state('input_boolean.lighting_manager_ready', 'on') }}"
          zones_count: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) | length }}"
          startup_phase: >
            {% if not is_state('input_boolean.lighting_manager_ready', 'on') %}
              initializing
            {% else %}
              ready
            {% endif %}