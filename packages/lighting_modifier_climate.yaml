# HVAC Climate Sync Lighting Modifier
# Automatically adjusts light warmth based on HVAC operation
# Demonstrates the extensibility of the modifier layer architecture
#
# Architectural Compliance:
# - Pure modifier with relative adjustments only
# - Single responsibility (climate synchronization)
# - Event-driven (reacts to HVAC state changes)
# - All state visible in UI

input_boolean:
  climate_sync_enabled:
    name: Climate Sync Lighting
    icon: mdi:air-conditioner
    initial: true

template:
  - sensor:
      - name: "Climate Sync Status"
        unique_id: climate_sync_status
        state: >
          {% set hvac_action = state_attr('climate.thermostat', 'hvac_action') | default('idle') %}
          {{ hvac_action }}
        attributes:
          hvac_mode: "{{ states('climate.thermostat') }}"
          current_temperature: "{{ state_attr('climate.thermostat', 'current_temperature') | round(1) }}"
          target_temperature: "{{ state_attr('climate.thermostat', 'temperature') | round(1) }}"
          
          color_temp_modifier: >
            {% set action = state_attr('climate.thermostat', 'hvac_action') | default('idle') %}
            {% if action == 'heating' %}
              -400  {# Warmer light when heating #}
            {% elif action == 'cooling' %}
              300   {# Cooler light when cooling #}
            {% else %}
              0     {# Neutral when idle #}
            {% endif %}
          
          brightness_modifier: >
            {% set action = state_attr('climate.thermostat', 'hvac_action') | default('idle') %}
            {% if action in ['heating', 'cooling'] %}
              5  {# Slight brightness boost when HVAC active #}
            {% else %}
              0
            {% endif %}
          
          priority: >
            {% set action = state_attr('climate.thermostat', 'hvac_action') | default('idle') %}
            {% if action in ['heating', 'cooling'] %}
              47  {# Medium priority when active #}
            {% else %}
              0   {# No priority when idle #}
            {% endif %}

automation:
  - alias: "Lighting: HVAC Climate Sync"
    id: lighting_hvac_climate_sync
    description: "Adjust lighting warmth based on HVAC operation"
    mode: restart
    
    trigger:
      # React to HVAC action changes
      - platform: state
        entity_id: climate.thermostat
        attribute: hvac_action
      
      # React to enable/disable
      - platform: state
        entity_id: input_boolean.climate_sync_enabled
    
    condition:
      - condition: state
        entity_id: input_boolean.climate_sync_enabled
        state: "on"
    
    variables:
      hvac_action: "{{ state_attr('climate.thermostat', 'hvac_action') | default('idle') }}"
      color_mod: "{{ state_attr('sensor.climate_sync_status', 'color_temp_modifier') | int }}"
      brightness_mod: "{{ state_attr('sensor.climate_sync_status', 'brightness_modifier') | int }}"
      priority: "{{ state_attr('sensor.climate_sync_status', 'priority') | int }}"
    
    action:
      - choose:
          # Apply climate modifiers when HVAC is active
          - conditions:
              - condition: template
                value_template: "{{ hvac_action in ['heating', 'cooling'] }}"
            sequence:
              # Apply to all zones except bedrooms (comfort during sleep)
              - repeat:
                  for_each: >
                    {% set all_zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) %}
                    {{ all_zones | reject('search', 'bedroom') | list }}
                  sequence:
                    - service: lighting_manager.set_layer
                      data:
                        zone_id: "{{ repeat.item }}"
                        layer_id: "modifier_climate"
                        layer_name: "Climate: {{ hvac_action | title }}"
                        layer_type: "modifier"
                        priority: "{{ priority }}"
                        brightness_pct_delta: "{{ brightness_mod }}"
                        color_temp_kelvin_delta: "{{ color_mod }}"
                        transition: 30  # Slow transition for comfort
                        timeout_minutes: 0  # Persistent while HVAC active
                        is_on: true
          
          # Remove climate modifiers when HVAC is idle or disabled
        default:
            - service: switch.turn_off
              target:
                entity_id: >
                  {{ expand(state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([])
                     | map('regex_replace', '(.*)', 'switch.\\1_modifier_climate_layer') | list)
                     | selectattr('state', 'eq', 'on')
                     | map(attribute='entity_id') | list }}
              continue_on_error: true

  - alias: "Lighting: Climate Comfort Enhancement"
    id: lighting_climate_comfort_enhancement
    description: "Additional comfort adjustments based on temperature differential"
    mode: single
    
    trigger:
      - platform: state
        entity_id: sensor.climate_sync_status
        attribute: current_temperature
    
    condition:
      - condition: state
        entity_id: input_boolean.climate_sync_enabled
        state: "on"
      - condition: template
        value_template: >
          {% set current = state_attr('sensor.climate_sync_status', 'current_temperature') | float(0) %}
          {% set target = state_attr('sensor.climate_sync_status', 'target_temperature') | float(0) %}
          {{ (current - target) | abs > 2 }}  {# Only act on significant differentials #}
    
    variables:
      current_temp: "{{ state_attr('sensor.climate_sync_status', 'current_temperature') | float }}"
      target_temp: "{{ state_attr('sensor.climate_sync_status', 'target_temperature') | float }}"
      temp_diff: "{{ current_temp - target_temp }}"
      
      # Stronger adjustments for larger temperature differentials
      color_boost: >
        {% if temp_diff > 3 %}
          -500  {# Much warmer light when too cold #}
        {% elif temp_diff > 2 %}
          -300  {# Warmer light when cold #}
        {% elif temp_diff < -3 %}
          400   {# Much cooler light when too hot #}
        {% elif temp_diff < -2 %}
          200   {# Cooler light when warm #}
        {% else %}
          0
        {% endif %}
    
    action:
      # Apply comfort boost to main living areas only
      - repeat:
          for_each: >
            {% set all_zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) %}
            {{ all_zones | select('search', 'living|kitchen|office') | list }}
          sequence:
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ repeat.item }}"
                layer_id: "modifier_comfort"
                layer_name: "Comfort Boost"
                layer_type: "modifier"
                priority: 49  # Slightly higher than base climate
                brightness_pct_delta: 0
                color_temp_kelvin_delta: "{{ color_boost }}"
                transition: 60  # Very slow for comfort
                timeout_minutes: 15  # Re-evaluate periodically
                is_on: true