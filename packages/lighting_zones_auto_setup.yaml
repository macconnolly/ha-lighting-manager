# Automatic Zone Setup for Lighting Manager
# This creates your 5 zones with the exact configuration from your requirements
# Zones must first be added via UI, then this will configure them

automation:
  - alias: "Lighting: Auto Configure Zones"
    id: lighting_auto_configure_zones
    description: "Configure zones with your specified brightness and temperature ranges"
    mode: single
    
    trigger:
      # Run after system is ready
      - platform: state
        entity_id: input_boolean.lighting_manager_ready
        to: "on"
      # Also allow manual trigger
      - platform: event
        event_type: lighting_configure_zones
    
    action:
      # Define your zone configurations
      - variables:
          zones:
            main_living:
              min_brightness_pct: 30
              max_brightness_pct: 100
              min_kelvin: 2200
              max_kelvin: 3700
              lights:
                - light.living_room_couch_lamp
                - light.living_room_floor_lamp
                - light.office_desk_lamp
                - light.entryway_lamp
                - light.living_room_corner_accent
                - light.cradenza_accent
              
            kitchen_island:
              min_brightness_pct: 15
              max_brightness_pct: 100
              min_kelvin: 2700
              max_kelvin: 3700
              lights:
                - light.kitchen_island_pendants
              
            bedroom_primary:
              min_brightness_pct: 15
              max_brightness_pct: 80
              min_kelvin: 1800
              max_kelvin: 3700
              lights:
                - light.master_bedroom_table_lamps
                - light.master_bedroom_corner_accent
              
            accent_spots:
              min_brightness_pct: 5
              max_brightness_pct: 60
              min_kelvin: 2200
              max_kelvin: 3200
              lights:
                - light.dining_room_spot_lights
                - light.living_room_spot_lights
              
            recessed_ceiling:
              min_brightness_pct: 2
              max_brightness_pct: 35
              min_kelvin: 1800
              max_kelvin: 5000
              lights:
                - light.kitchen_main_lights
                - light.living_room_hallway_lights
      
      # Create adaptive base layer for each zone
      - repeat:
          for_each: "{{ zones.keys() | list }}"
          sequence:
            - variables:
                zone_id: "{{ repeat.item }}"
                config: "{{ zones[zone_id] }}"
            
            # Check if zone exists
            - condition: template
              value_template: >
                {{ states('switch.' ~ zone_id ~ '_manual_layer') not in ['unknown', 'unavailable'] }}
            
            # Create adaptive layer with sun-based values
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ zone_id }}"
                layer_id: "adaptive_base"
                layer_name: "Adaptive Base"
                layer_type: "absolute"
                priority: 20
                brightness: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_b = config.min_brightness_pct %}
                  {% set max_b = config.max_brightness_pct %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (min_b * 255 / 100) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (max_b * 255 / 100) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {{ ((min_b + (max_b - min_b) * ratio) * 255 / 100) | int }}
                  {% endif %}
                color_temp: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_k = config.min_kelvin %}
                  {% set max_k = config.max_kelvin %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (1000000 / min_k) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (1000000 / max_k) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {% set kelvin = min_k + (max_k - min_k) * ratio %}
                    {{ (1000000 / kelvin) | int }}
                  {% endif %}
                transition: 30
              continue_on_error: true
            
            # Create manual layer for override
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ zone_id }}"
                layer_id: "manual"
                layer_name: "Manual Control"
                layer_type: "absolute"
                priority: 90
                brightness: "{{ ((config.min_brightness_pct + config.max_brightness_pct) / 2 * 255 / 100) | int }}"
                color_temp: "{{ (1000000 / ((config.min_kelvin + config.max_kelvin) / 2)) | int }}"
                transition: 2
              continue_on_error: true
            
            # Enable adaptive, disable manual by default
            - service: switch.turn_on
              target:
                entity_id: "switch.{{ zone_id }}_adaptive_base_layer"
              continue_on_error: true
            
            - service: switch.turn_off
              target:
                entity_id: "switch.{{ zone_id }}_manual_layer"
              continue_on_error: true
            
            - delay:
                milliseconds: 500
      
      # Store configuration in input_text for persistence
      - service: persistent_notification.create
        data:
          title: "Zones Configured"
          message: >
            Configured {{ zones.keys() | list | length }} zones:
            {% for zone in zones.keys() %}
            - {{ zone }}: {{ zones[zone].min_brightness_pct }}-{{ zones[zone].max_brightness_pct }}% brightness, {{ zones[zone].min_kelvin }}-{{ zones[zone].max_kelvin }}K
            {% endfor %}
          notification_id: zones_configured

  - alias: "Lighting: Update Adaptive Base Values"
    id: lighting_update_adaptive_base_values
    description: "Keep adaptive base layers updated with sun position"
    mode: single
    
    trigger:
      # Update when sun elevation changes significantly
      - platform: state
        entity_id: sun.sun
        attribute: elevation
      # Also update every 15 minutes
      - platform: time_pattern
        minutes: "/15"
    
    condition:
      # System must be ready
      - condition: state
        entity_id: input_boolean.lighting_manager_ready
        state: "on"
    
    variables:
      zones:
        main_living:
          min_brightness_pct: 30
          max_brightness_pct: 100
          min_kelvin: 2200
          max_kelvin: 3700
        kitchen_island:
          min_brightness_pct: 15
          max_brightness_pct: 100
          min_kelvin: 2700
          max_kelvin: 3700
        bedroom_primary:
          min_brightness_pct: 15
          max_brightness_pct: 80
          min_kelvin: 1800
          max_kelvin: 3700
        accent_spots:
          min_brightness_pct: 5
          max_brightness_pct: 60
          min_kelvin: 2200
          max_kelvin: 3200
        recessed_ceiling:
          min_brightness_pct: 2
          max_brightness_pct: 35
          min_kelvin: 1800
          max_kelvin: 5000
    
    action:
      - repeat:
          for_each: "{{ zones.keys() | list }}"
          sequence:
            - variables:
                zone_id: "{{ repeat.item }}"
                config: "{{ zones[zone_id] }}"
            
            # Only update if adaptive layer is active
            - condition: state
              entity_id: "switch.{{ zone_id }}_adaptive_base_layer"
              state: "on"
            
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ zone_id }}"
                layer_id: "adaptive_base"
                layer_name: "Adaptive Base"
                layer_type: "absolute"
                priority: 20
                brightness: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_b = config.min_brightness_pct %}
                  {% set max_b = config.max_brightness_pct %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (min_b * 255 / 100) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (max_b * 255 / 100) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {{ ((min_b + (max_b - min_b) * ratio) * 255 / 100) | int }}
                  {% endif %}
                color_temp: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_k = config.min_kelvin %}
                  {% set max_k = config.max_kelvin %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (1000000 / min_k) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (1000000 / max_k) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {% set kelvin = min_k + (max_k - min_k) * ratio %}
                    {{ (1000000 / kelvin) | int }}
                  {% endif %}
                transition: 60  # Smooth 1-minute transition
              continue_on_error: true

# Template sensor to expose zone configurations
template:
  - sensor:
      - name: "Lighting Zone Configurations"
        unique_id: lighting_zone_configurations
        state: "configured"
        attributes:
          zones:
            main_living:
              min_brightness_pct: 30
              max_brightness_pct: 100
              min_kelvin: 2200
              max_kelvin: 3700
              description: "Main living areas - bright during day"
            kitchen_island:
              min_brightness_pct: 15
              max_brightness_pct: 100
              min_kelvin: 2700
              max_kelvin: 3700
              description: "Kitchen task lighting"
            bedroom_primary:
              min_brightness_pct: 15
              max_brightness_pct: 80
              min_kelvin: 1800
              max_kelvin: 3700
              description: "Bedroom - softer limits"
            accent_spots:
              min_brightness_pct: 5
              max_brightness_pct: 60
              min_kelvin: 2200
              max_kelvin: 3200
              description: "Accent lighting - subtle"
            recessed_ceiling:
              min_brightness_pct: 2
              max_brightness_pct: 35
              min_kelvin: 1800
              max_kelvin: 5000
              description: "Ceiling lights - very dim to moderate"