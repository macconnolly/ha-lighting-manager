# Zone Configuration for Lighting Manager
# This configures the 5 zones after they're created via UI

script:
  configure_all_zones:
    alias: "Configure All Lighting Zones"
    mode: single
    sequence:
      # Zone configurations with your exact specifications
      - variables:
          zone_configs:
            main_living:
              min_brightness_pct: 30
              max_brightness_pct: 100
              min_kelvin: 2200
              max_kelvin: 3700
              sleep_brightness_pct: 5
              sleep_kelvin: 2000
              
            kitchen_island:
              min_brightness_pct: 15
              max_brightness_pct: 100
              min_kelvin: 2700
              max_kelvin: 5500
              sleep_brightness_pct: 3
              sleep_kelvin: 2700
              
            bedroom_primary:
              min_brightness_pct: 15
              max_brightness_pct: 80
              min_kelvin: 1800
              max_kelvin: 3000
              sleep_brightness_pct: 15
              sleep_kelvin: 2500
              
            accent_spots:
              min_brightness_pct: 5
              max_brightness_pct: 60
              min_kelvin: 2200
              max_kelvin: 3200
              sleep_brightness_pct: 8
              sleep_kelvin: 2200
              
            recessed_ceiling:
              min_brightness_pct: 2
              max_brightness_pct: 35
              min_kelvin: 2400
              max_kelvin: 5000
              sleep_brightness_pct: 10
              sleep_kelvin: 2400
      
      # Check if zones exist
      - condition: template
        value_template: >
          {% set zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) %}
          {{ zones | length > 0 }}
      
      # Configure each zone
      - repeat:
          for_each: "{{ zone_configs.keys() | list }}"
          sequence:
            - variables:
                zone_id: "{{ repeat.item }}"
                config: "{{ zone_configs[zone_id] }}"
            
            # Check if this zone exists
            - condition: template
              value_template: >
                {% set zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) %}
                {{ zone_id in zones }}
            
            # Configure adaptive base layer with sun-based calculations
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ zone_id }}"
                layer_name: "Adaptive Base"
                layer_id: "adaptive_base"
                layer_type: "absolute"
                priority: 20
                is_on: true
                brightness: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_b = config.min_brightness_pct %}
                  {% set max_b = config.max_brightness_pct %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (min_b * 255 / 100) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (max_b * 255 / 100) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {{ ((min_b + (max_b - min_b) * ratio) * 255 / 100) | int }}
                  {% endif %}
                color_temp: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_k = config.min_kelvin %}
                  {% set max_k = config.max_kelvin %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (1000000 / min_k) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (1000000 / max_k) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {% set kelvin = min_k + (max_k - min_k) * ratio %}
                    {{ (1000000 / kelvin) | int }}
                  {% endif %}
                transition: 30
              continue_on_error: true
            
            # Configure manual layer (for override)
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ zone_id }}"
                layer_name: "Manual Control"
                layer_id: "manual"
                layer_type: "absolute"
                priority: 90
                is_on: false
                brightness: "{{ ((config.min_brightness_pct + config.max_brightness_pct) / 2 * 255 / 100) | int }}"
                color_temp: "{{ (1000000 / ((config.min_kelvin + config.max_kelvin) / 2)) | int }}"
                transition: 2
              continue_on_error: true
            
            - delay:
                milliseconds: 500
      
      # Notification
      - service: persistent_notification.create
        data:
          title: "Zone Configuration Complete"
          message: >
            Configured {{ zone_configs.keys() | list | length }} zones with:
            - Adaptive Base layer (priority 20)
            - Manual Control layer (priority 90)
            - Sleep Mode layer (priority 80)
          notification_id: zone_config_complete

  # Helper script to update adaptive values
  update_adaptive_layers:
    alias: "Update Adaptive Layer Values"
    mode: single
    sequence:
      - variables:
          zone_configs:
            main_living:
              min_brightness_pct: 30
              max_brightness_pct: 100
              min_kelvin: 2200
              max_kelvin: 3700
            kitchen_island:
              min_brightness_pct: 15
              max_brightness_pct: 100
              min_kelvin: 2700
              max_kelvin: 5500
            bedroom_primary:
              min_brightness_pct: 15
              max_brightness_pct: 80
              min_kelvin: 1800
              max_kelvin: 3000
            accent_spots:
              min_brightness_pct: 5
              max_brightness_pct: 60
              min_kelvin: 2200
              max_kelvin: 3200
            recessed_ceiling:
              min_brightness_pct: 2
              max_brightness_pct: 35
              min_kelvin: 2400
              max_kelvin: 5000
      
      - repeat:
          for_each: "{{ zone_configs.keys() | list }}"
          sequence:
            - variables:
                zone_id: "{{ repeat.item }}"
                config: "{{ zone_configs[zone_id] }}"
            
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ zone_id }}"
                layer_name: "Adaptive Base"
                brightness: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_b = config.min_brightness_pct %}
                  {% set max_b = config.max_brightness_pct %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (min_b * 255 / 100) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (max_b * 255 / 100) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {{ ((min_b + (max_b - min_b) * ratio) * 255 / 100) | int }}
                  {% endif %}
                color_temp: >
                  {% set sun_elevation = state_attr('sun.sun', 'elevation') | float(0) %}
                  {% set min_k = config.min_kelvin %}
                  {% set max_k = config.max_kelvin %}
                  
                  {% if sun_elevation < -6 %}
                    {{ (1000000 / min_k) | int }}
                  {% elif sun_elevation > 10 %}
                    {{ (1000000 / max_k) | int }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {% set kelvin = min_k + (max_k - min_k) * ratio %}
                    {{ (1000000 / kelvin) | int }}
                  {% endif %}
              continue_on_error: true

automation:
  - alias: "Lighting: Update Adaptive Layers Every 15 Minutes"
    id: lighting_update_adaptive_layers_periodic
    trigger:
      - platform: time_pattern
        minutes: "/15"
      - platform: state
        entity_id: sun.sun
        attribute: elevation
    condition:
      # Ensure the lighting manager is ready
      - condition: template
        value_template: >
          {{ states('sensor.lighting_manager_zones') not in ['unknown', 'unavailable'] }}
    action:
      - service: script.update_adaptive_layers