# Zone Setup Script for Lighting Manager
# This script configures all zones with proper adaptive values

script:
  setup_lighting_zones:
    alias: "Setup All Lighting Zones with Proper Values"
    mode: single
    sequence:
      # Wait for lighting manager to be ready
      - condition: template
        value_template: >
          {{ states('sensor.lighting_manager_zones') not in ['unknown', 'unavailable'] }}
      
      # Define zone configurations
      - variables:
          zone_configs:
            main_living:
              min_brightness_pct: 30
              max_brightness_pct: 100
              min_kelvin: 2200
              max_kelvin: 3700
            kitchen_island:
              min_brightness_pct: 15
              max_brightness_pct: 100
              min_kelvin: 2700
              max_kelvin: 5500
            bedroom_primary:
              min_brightness_pct: 15
              max_brightness_pct: 80
              min_kelvin: 1800
              max_kelvin: 3000
            accent_spots:
              min_brightness_pct: 5
              max_brightness_pct: 60
              min_kelvin: 2200
              max_kelvin: 3200
            recessed_ceiling:
              min_brightness_pct: 2
              max_brightness_pct: 35
              min_kelvin: 2400
              max_kelvin: 5000
      
      # Configure each zone
      - repeat:
          for_each: "{{ zone_configs.keys() | list }}"
          sequence:
            - variables:
                zone_id: "{{ repeat.item }}"
                config: "{{ zone_configs[zone_id] }}"
                sun_elevation: "{{ state_attr('sun.sun', 'elevation') | float(0) }}"
                # Calculate current brightness based on sun
                current_brightness_pct: >
                  {% set min_b = config.min_brightness_pct %}
                  {% set max_b = config.max_brightness_pct %}
                  {% if sun_elevation < -6 %}
                    {{ min_b }}
                  {% elif sun_elevation > 10 %}
                    {{ max_b }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {{ (min_b + (max_b - min_b) * ratio) | round }}
                  {% endif %}
                current_brightness: "{{ (current_brightness_pct * 255 / 100) | int }}"
                # Calculate current color temp based on sun
                current_kelvin: >
                  {% set min_k = config.min_kelvin %}
                  {% set max_k = config.max_kelvin %}
                  {% if sun_elevation < -6 %}
                    {{ min_k }}
                  {% elif sun_elevation > 10 %}
                    {{ max_k }}
                  {% else %}
                    {% set ratio = (sun_elevation + 6) / 16 %}
                    {{ (min_k + (max_k - min_k) * ratio) | round }}
                  {% endif %}
                current_mireds: "{{ (1000000 / current_kelvin) | int }}"
            
            # Update the Adaptive Base layer
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ zone_id }}"
                layer_name: "Adaptive Base"
                layer_id: "adaptive_base"
                layer_type: "absolute"
                priority: 20
                is_on: true
                brightness: "{{ current_brightness }}"
                color_temp: "{{ current_mireds }}"
                transition: 30
              continue_on_error: true
            
            # Store the zone configuration in attributes (for reference)
            - service: input_text.set_value
              target:
                entity_id: "input_text.zone_{{ zone_id }}_config"
              data:
                value: >
                  {{ config | to_json }}
              continue_on_error: true
            
            - delay:
                milliseconds: 100

# Create input_text helpers to store zone configurations
input_text:
  zone_main_living_config:
    name: "Main Living Zone Config"
    max: 255
    initial: "{}"
    
  zone_kitchen_island_config:
    name: "Kitchen Island Zone Config"
    max: 255
    initial: "{}"
    
  zone_bedroom_primary_config:
    name: "Bedroom Primary Zone Config"
    max: 255
    initial: "{}"
    
  zone_accent_spots_config:
    name: "Accent Spots Zone Config"
    max: 255
    initial: "{}"
    
  zone_recessed_ceiling_config:
    name: "Recessed Ceiling Zone Config"
    max: 255
    initial: "{}"

# Automation to update adaptive values periodically
automation:
  - alias: "Lighting: Update Adaptive Values"
    id: lighting_update_adaptive_values
    trigger:
      # Every 15 minutes
      - platform: time_pattern
        minutes: "/15"
      # When sun elevation changes significantly
      - platform: state
        entity_id: sun.sun
        attribute: elevation
      # At startup (with delay)
      - platform: homeassistant
        event: start
    condition:
      # Ensure lighting manager is ready
      - condition: template
        value_template: >
          {{ states('sensor.lighting_manager_zones') not in ['unknown', 'unavailable'] }}
    action:
      # Add delay at startup to ensure services are registered
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.platform == 'homeassistant' }}"
            sequence:
              - delay:
                  seconds: 30
      - service: script.setup_lighting_zones