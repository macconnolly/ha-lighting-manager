# Activity and Mode-Based Lighting Modifiers
# Production-ready activity detection and mode-based lighting adjustments
#
# Architectural compliance:
# - Pure modifiers, no absolute state changes
# - Event-driven mode transitions
# - Single responsibility per automation
# - All state visible in UI

input_select:
  home_mode:
    name: Home Mode
    options:
      - home
      - away
      - sleep
      - vacation
    icon: mdi:home-heart
    
  activity_mode:
    name: Activity Mode
    options:
      - relax
      - work
      - entertain
      - movie
      - dinner
      - cleaning
    icon: mdi:human-male-board

template:
  - sensor:
      - name: "Home Mode Modifiers"
        unique_id: home_mode_modifiers
        state: "{{ states('input_select.home_mode') }}"
        attributes:
          brightness_modifier: >
            {% set mode = states('input_select.home_mode') %}
            {% set modifiers = {
              'home': 0,
              'away': -50,
              'sleep': -40,
              'vacation': -30
            } %}
            {{ modifiers.get(mode, 0) }}
          
          color_temp_modifier: >
            {% set mode = states('input_select.home_mode') %}
            {% set modifiers = {
              'home': 0,
              'away': 0,
              'sleep': -500,
              'vacation': -200
            } %}
            {{ modifiers.get(mode, 0) }}
          
          priority: >
            {% set mode = states('input_select.home_mode') %}
            {% set priorities = {
              'home': 50,
              'away': 70,
              'sleep': 75,
              'vacation': 65
            } %}
            {{ priorities.get(mode, 50) }}
          
      - name: "Activity Mode Modifiers"
        unique_id: activity_mode_modifiers
        state: "{{ states('input_select.activity_mode') }}"
        attributes:
          brightness_modifier: >
            {% set activity = states('input_select.activity_mode') %}
            {% set modifiers = {
              'relax': -20,
              'work': 15,
              'entertain': -10,
              'movie': -45,
              'dinner': -25,
              'cleaning': 30
            } %}
            {{ modifiers.get(activity, 0) }}
          
          color_temp_modifier: >
            {% set activity = states('input_select.activity_mode') %}
            {% set modifiers = {
              'relax': -300,
              'work': 300,
              'entertain': -200,
              'movie': -500,
              'dinner': -400,
              'cleaning': 400
            } %}
            {{ modifiers.get(activity, 0) }}
          
          priority: >
            {% set activity = states('input_select.activity_mode') %}
            {% set priorities = {
              'relax': 45,
              'work': 55,
              'entertain': 48,
              'movie': 60,
              'dinner': 52,
              'cleaning': 58
            } %}
            {{ priorities.get(activity, 45) }}
          
          affected_zones: >
            {% set activity = states('input_select.activity_mode') %}
            {% set all_zones = state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) %}
            
            {% if activity == 'work' %}
              {{ all_zones | select('search', 'office|study|desk') | list }}
            {% elif activity == 'movie' %}
              {{ all_zones | select('search', 'living|media|tv') | list }}
            {% elif activity == 'dinner' %}
              {{ all_zones | select('search', 'dining|kitchen') | list }}
            {% elif activity == 'cleaning' %}
              {{ all_zones }}
            {% else %}
              {{ all_zones | reject('search', 'bedroom') | list }}
            {% endif %}

automation:
  - alias: "Lighting: Home Mode Manager"
    id: lighting_home_mode_manager
    description: "Apply mode-based modifiers for home/away/sleep/vacation"
    mode: restart
    
    trigger:
      - platform: state
        entity_id: input_select.home_mode
    
    variables:
      mode: "{{ states('input_select.home_mode') }}"
      brightness_mod: "{{ state_attr('sensor.home_mode_modifiers', 'brightness_modifier') | int }}"
      color_mod: "{{ state_attr('sensor.home_mode_modifiers', 'color_temp_modifier') | int }}"
      priority: "{{ state_attr('sensor.home_mode_modifiers', 'priority') | int }}"
    
    action:
      - choose:
          # Away mode - reduce lighting
          - conditions:
              - condition: template
                value_template: "{{ mode == 'away' }}"
            sequence:
              - repeat:
                  for_each: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) }}"
                  sequence:
                    - service: lighting_manager.set_layer
                      data:
                        zone_id: "{{ repeat.item }}"
                        layer_id: "modifier_home"
                        layer_name: "Mode: Away"
                        layer_type: "modifier"
                        priority: "{{ priority }}"
                        brightness_pct_delta: "{{ brightness_mod }}"
                        color_temp_kelvin_delta: "{{ color_mod }}"
                        transition: 5
                        timeout_minutes: 0  # No timeout for persistent modes
                    
          
          # Sleep mode - dim and warm
          - conditions:
              - condition: template
                value_template: "{{ mode == 'sleep' }}"
            sequence:
              - repeat:
                  for_each: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) }}"
                  sequence:
                    - service: lighting_manager.set_layer
                      data:
                        zone_id: "{{ repeat.item }}"
                        layer_id: "modifier_home"
                        layer_name: "Mode: Sleep"
                        layer_type: "modifier"
                        priority: "{{ priority }}"
                        brightness_pct_delta: "{{ brightness_mod }}"
                        color_temp_kelvin_delta: "{{ color_mod }}"
                        transition: 30
                        timeout_minutes: 0
                    
          
          # Home mode - remove modifiers
          - conditions:
              - condition: template
                value_template: "{{ mode == 'home' }}"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: >
                    {{ expand(state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([])
                       | map('regex_replace', '(.*)', 'switch.\\1_home_mode_layer') | list)
                       | selectattr('state', 'eq', 'on')
                       | map(attribute='entity_id') | list }}
                continue_on_error: true

  - alias: "Lighting: Activity Mode Controller"
    id: lighting_activity_mode_controller
    description: "Apply activity-specific lighting modifiers"
    mode: restart
    
    trigger:
      - platform: state
        entity_id: input_select.activity_mode
    
    variables:
      activity: "{{ states('input_select.activity_mode') }}"
      brightness_mod: "{{ state_attr('sensor.activity_mode_modifiers', 'brightness_modifier') | int }}"
      color_mod: "{{ state_attr('sensor.activity_mode_modifiers', 'color_temp_modifier') | int }}"
      priority: "{{ state_attr('sensor.activity_mode_modifiers', 'priority') | int }}"
      affected_zones: "{{ state_attr('sensor.activity_mode_modifiers', 'affected_zones') }}"
      all_zones: "{{ state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([]) }}"
    
    action:
      # First, elegantly turn off ALL activity layers (single service call)
      - service: switch.turn_off
        target:
          entity_id: >
            {{ state_attr('sensor.lighting_manager_zones', 'zone_ids') | default([])
               | map('regex_replace', '(.*)', 'switch.\\1_modifier_activity_layer') | list }}
        continue_on_error: true
      
      # Then apply modifiers ONLY to affected zones
      - repeat:
          for_each: "{{ affected_zones }}"
          sequence:
            - service: lighting_manager.set_layer
              data:
                zone_id: "{{ repeat.item }}"
                layer_id: "modifier_activity"  # Consistent naming
                layer_name: "Activity: {{ activity | title }}"
                layer_type: "modifier"
                priority: "{{ priority }}"
                brightness_pct_delta: "{{ brightness_mod }}"
                color_temp_kelvin_delta: "{{ color_mod }}"
                transition: >
                  {% if activity in ['movie', 'dinner'] %}
                    10
                  {% elif activity == 'cleaning' %}
                    2
                  {% else %}
                    5
                  {% endif %}
                timeout_minutes: 0
                is_on: true  # Activate layer in same call